<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Feijoada Brasileira</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #6e0f0f;
        }

        header {
            background-color: #e0b400;
            padding: 20px;
            text-align: right;
        }

        header a {
            text-decoration: none;
            color: black;
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            margin-left: 30px;
            transition: 0.3s;
        }

        header a:hover {
            color: white;
        }

        .hero {
            width: 80%;
            margin: 60px auto;
        }

        .hero img {
            width: 100%;
            border-radius: 10px;
        }

        section {
            width: 80%;
            margin: 60px auto;
            background-color: white;
            padding: 40px;
            border-radius: 10px;
        }

        section h2 {
            margin-bottom: 20px;
            font-size: 28px;
            color: #6e0f0f;
        }

        section p, section li {
            font-size: 18px;
            line-height: 1.6;
        }

        ul {
            margin-left: 20px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #e0b400;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<header>
    <a href="ingredientes.html">Ingredientes</a>
    <a href="comofazer.html">Como Fazer</a>
    <a href="historia.html">História</a>
</header>

<div class="hero">
    <img src="img/feijoada1.jpg" alt="Feijoada Brasileira">
</div>

</body>
</html>
